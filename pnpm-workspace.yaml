packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  '@types/node': ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  react: ^19.2.7
  react-dom: ^19.2.7
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@tsdown/css': ^0.22.2
  clsx: ^2.1.1
  '@radix-ui/react-dialog': ^1.1.17
  '@radix-ui/react-select': ^2.3.1
  '@radix-ui/react-slot': ^1.3.0
  '@tanstack/react-router': ^1.170.16
  '@tanstack/router-plugin': ^1.168.18
  '@tailwindcss/vite': ^4.3.1
  tailwindcss: ^4.3.1
  lucide-react: ^1.22.0
  '@radix-ui/react-radio-group': ^1.4.2
  '@radix-ui/react-slider': ^1.4.2
  '@radix-ui/react-accordion': ^1.2.17
  '@radix-ui/react-avatar': ^1.2.3
  '@radix-ui/react-navigation-menu': ^1.2.19
  '@radix-ui/react-popover': ^1.1.20
  '@radix-ui/react-progress': ^1.1.13
  '@radix-ui/react-toast': ^1.2.20
  '@radix-ui/react-tooltip': ^1.2.13
  react-day-picker: ^9.14.0
  date-fns: ^4.4.0
  cmdk: ^1.1.1
  embla-carousel-react: ^8.6.0
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
allowBuilds:
  esbuild: true
